name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    name: Go tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build:
    name: Bundle (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            daemon_out: ui/src-tauri/binaries/syncdrived-x86_64-pc-windows-msvc.exe
          - os: ubuntu-latest
            daemon_out: ui/src-tauri/binaries/syncdrived-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential

      # Compile the Go daemon and stage it as a Tauri sidecar binary
      # (pure-Go SQLite driver: CGO disabled, no C toolchain needed).
      - name: Build daemon
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o ${{ matrix.daemon_out }} ./core/cmd/syncdrived

      - name: Install frontend dependencies
        working-directory: ui
        run: npm install

      # Builds the frontend, compiles the Rust shell, and produces the
      # platform installers: NSIS .exe on Windows; .deb, .rpm and .AppImage
      # on Linux (bundle targets set in tauri.conf.json).
      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "SyncDrive ${{ github.ref_name }}"
          releaseDraft: true
